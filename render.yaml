services:
  # Backend Web Service (NestJS)
  - type: web
    name: pagabien-backend
    env: node
    plan: starter # Se puede cambiar a 'free', pero 'starter' es recomendado para discos persistentes.
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: NODE_ENV
        value: production
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  # Frontend Static Site (Vite React)
  - type: web
    name: pagabien-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pagabien-backend
          property: host
      - key: VITE_GOOGLE_CLIENT_ID
        value: 606430130732-mjg41eql6h86psaph3helho97700dihd.apps.googleusercontent.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
